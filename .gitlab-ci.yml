stages:
  - test
  - publish

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"

cache:
  paths:
    - .pip-cache/

smoke:
  stage: test
  image: python:3.11-slim
  script:
    - pip install -e ".[test]" --quiet
    - pytest tests/ -q --tb=short
  only:
    - branches
    - tags

pypi-publish:
  stage: publish
  image: python:3.11-slim
  script:
    - pip install build twine setuptools==68.2.2 --quiet
    - python -m build
    - python -m twine upload dist/* --username __token__ --password "$PYPI_API_TOKEN"
  only:
    - /^v.*/
  except:
    - branches
  environment:
    name: pypi
